<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CareerPath Mini{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Background particles -->
    <div class="bg-grid"></div>
    <div class="noise-overlay"></div>

    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-logo">
    
            <span class="logo-text">CareerPath <em>Mini</em></span>
        </a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="nav-link">الرئيسية</a>
            <a href="{{ url_for('quiz') }}" class="nav-cta">ابدأ الاختبار</a>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p> CareerPath Mini &nbsp;|&nbsp; اكتشف مسارك المهني بطريقة ذكية</p>
        <p class="footer-sub">teamleader:nooran mohamed&nbsp;·&nbsp; Python Flask &nbsp;·&nbsp; 2026</p>
    </footer>

    <script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
